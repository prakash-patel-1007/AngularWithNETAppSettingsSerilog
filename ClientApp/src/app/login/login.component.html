<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h2 class="card-title text-center mb-4">Sign In</h2>

          <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
            {{ errorMessage }}
          </div>

          <form [formGroup]="form" (ngSubmit)="login()">
            <div class="form-group mb-3">
              <label for="username" class="form-label">Username</label>
              <input
                id="username"
                type="text"
                class="form-control"
                formControlName="username"
                autocomplete="username"
                [attr.aria-invalid]="form.get('username')?.invalid && form.get('username')?.touched"
              />
            </div>

            <div class="form-group mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                id="password"
                type="password"
                class="form-control"
                formControlName="password"
                autocomplete="current-password"
              />
            </div>

            <button
              type="submit"
              class="btn btn-primary w-100"
              [disabled]="isLoading || form.invalid"
            >
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm mr-1" role="status" aria-hidden="true"></span>
              {{ isLoading ? 'Signing in...' : 'Sign In' }}
            </button>
          </form>

          <p class="text-muted text-center mt-3 mb-0">
            <small>Demo: admin/admin or user/user</small>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
